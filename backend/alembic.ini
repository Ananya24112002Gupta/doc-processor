# Alembic configuration file
# This file is read by alembic commands (e.g. alembic upgrade head)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use synchronous URL for migrations (asyncpg doesn't work with alembic natively)
sqlalchemy.url = postgresql://docflow:docflow@localhost:5432/docflow

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
